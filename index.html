<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creativity Landing Page</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e8c3a3, #d99a9a);
}

/* Main Card */
.container {
    width: 80%;
    margin: 60px auto;
    background: #2f2f2f;
    border-radius: 10px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    padding: 20px 40px;
    color: white;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav-links {
    display: flex;
    gap: 30px;
}

.nav-links a {
    text-decoration: none;
    color: white;
    font-size: 14px;
}

.login-btn {
    border: 1px solid white;
    padding: 5px 12px;
    background: transparent;
    color: white;
    cursor: pointer;
}

/* Hero Section */
.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 40px;
}

.text {
    max-width: 50%;
}

.text h1 {
    font-size: 48px;
    line-height: 1.2;
}

.text span:nth-child(1) { color: #f6c48f; }
.text span:nth-child(2) { color: #9be28c; }
.text span:nth-child(3) { color: #f08a8a; }

.text p {
    font-size: 12px;
    margin-top: 10px;
    color: #ccc;
}

.ticket-btn {
    margin-top: 20px;
    padding: 8px 15px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

/* Image Section */
.image img {
    width: 250px;
    border-radius: 5px;
    opacity: 0.9;
}

/* Footer icons */
.footer {
    margin-top: 30px;
    display: flex;
    gap: 10px;
    font-size: 12px;
}

</style>
</head>

<body>

<h3 style="text-align:center;">LANDING PAGE TEMPLATE</h3>
<h2 style="text-align:center;">Creativity</h2>

<div class="container">

    <!-- Navbar -->
    <div class="navbar">
        <div>⚙️</div>

        <div class="nav-links">
            <a href="#">HOME</a>
            <a href="#">ABOUT</a>
            <a href="#">GALLERY</a>
            <a href="#">EVENT</a>
            <a href="#">CONTACT</a>
        </div>

        <button class="login-btn">LOGIN</button>
    </div>

    <!-- Hero Section -->
    <div class="hero">

        <div class="text">
            <h1>
                <span>Creativity</span><br>
                <span>never</span>
                <span> ends</span>
            </h1>

            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>

            <button class="ticket-btn">TICKETS</button>

            <div class="footer">
                <span>🐦</span>
                <span>📘</span>
                <span>📸</span>
            </div>
        </div>

        <div class="image">
            <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e" alt="model">
        </div>

    </div>

</div>

</body>
</html>
