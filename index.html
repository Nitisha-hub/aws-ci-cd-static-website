<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Static Website</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            padding-top: 100px;
        }
        h1 {
            font-size: 50px;
        }
        p {
            font-size: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            background: white;
            color: #2575fc;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Hello from AWS 🚀</h1>
    <p>This is my static website deployed using CI/CD</p>
    <button onclick="showMessage()">Click Me</button>

    <script>
        function showMessage() {
            alert("You clicked the button!");
        }
    </script>
</body>
</html>
